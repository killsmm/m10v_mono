name: Test self-hosted runner

on:
  workflow_dispatch:

jobs:
  smoke-test:
    name: Self-hosted runner smoke test
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Show runner information
        shell: bash
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner architecture: $RUNNER_ARCH"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Workspace: $GITHUB_WORKSPACE"
          uname -a || true

      - name: Verify workspace is writable
        shell: bash
        run: |
          test_file="$RUNNER_TEMP/self-hosted-runner-smoke-test.txt"
          echo "runner is working" > "$test_file"
          grep -q "runner is working" "$test_file"
          rm "$test_file"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Docker information
        run: |
          docker version
          docker info

      - name: Build Docker image
        run: docker build --tag runner-smoke-test:${{ github.run_id }} .

      - name: Run Docker image
        run: |
          output=$(docker run --rm runner-smoke-test:${{ github.run_id }})
          echo "$output"
          test "$output" = "Docker build succeeded"

      - name: Remove Docker image
        if: always()
        run: docker image rm --force runner-smoke-test:${{ github.run_id }} || true
