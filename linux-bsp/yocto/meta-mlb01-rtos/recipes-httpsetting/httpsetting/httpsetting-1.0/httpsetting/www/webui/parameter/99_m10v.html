<!-- Display -->
<div class="row" style="background-color:#FFF">
	<div class="form-group col-xs-12 col-sm-12 col-md-12">
	<font size="5">
	<label> Display Configuration</label>
	</font>

	<!-- Display -->
<div class="row" style="background-color:#FFA">
	<!-- Enable(HDMI,LCD),Camera Select -->
	<section id="Display">
	<div class="form-group col-xs-12 col-sm-4 col-md-4">
	<div style="float:left;">
	<label> Display</label>
	</div>
	<div class="col-xs-6 col-sm-6 col-md-6">
	<select class="form-control" id="SEL_DISPLAY">
	<option value="0">OFF</option>
	<option value="1">HDMI - Front or Stitched Image</option>
	<option value="2">HDMI - Rear</option>
	<option value="3">HDMI - Left</option>
	<option value="4">HDMI - Right</option>
	<option value="5">LCD - Front or Stitched Image</option>
	<option value="6">LCD - Rear</option>
	<option value="7">LCD - Left</option>
	<option value="8">LCD - Right</option>
	</select>
        </div>
        <nobr><label> 4Sensor camera(4 separate):Front or Stitched Image , Rear, Left, Right select</label></nobr>
        <nobr><label> 4Sensor camera(4Division,2panorama,1panorama+2Division):Front or Stitched Image only</label></nobr>
        <nobr><label> Dual camera(Stitch PtnA,PtnB):Front or Stitched only</label></nobr>
        <nobr><label> DOL Mode[Single DOL Camera](DOL,None DOL):Front or Stitched only</label></nobr>
	</div>
	</section>
	<!-- SET BUTTON -->
	<div class="form-group col-xs-12 col-sm-12 col-md-12">
	<div>
	<label>Please push, after setting Display</label>
	</div>
	<div class="col-xs-12 col-sm-12 col-md-12">
	<button id="Btn_DISPLAY" class="btn btn-primary" >Update</button>
	</div>
	</div>
</div>

</div>

	</div>
