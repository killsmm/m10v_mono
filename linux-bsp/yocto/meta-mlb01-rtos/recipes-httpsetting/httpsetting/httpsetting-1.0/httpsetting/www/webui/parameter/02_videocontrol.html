<body>

<!-- parameter setting -->
<!-- Image Configuration -->
<div class="row" style="background-color:#FFF">
	<section id="Image_Configuration">
	<div class="form-group col-xs-12 col-sm-12 col-md-12">
	<font size="5">
	<label> Image Configuration</label>
	</font>
	</div>
	</section>
</div>

	<!-- EV Compensation -->
<div class="row" style="background-color:#FFA">
	<!-- EV Compensation -->
	<section id="EV_Compenstion">
	<div class="form-group col-xs-12 col-sm-4 col-md-4">
	<div style="float:left;">
	<label> EV Compensation</label>
	</div>
	<div class="col-xs-6 col-sm-6 col-md-6">
	<select class="form-control" id="SEL_EV_COMPENSATION">
	<option value="0">+3.0 EV</option>
	<option value="1">+2.7 EV</option>
	<option value="2">+2.3 EV</option>
	<option value="3">+2.0 EV</option>
	<option value="4">+1.7 EV</option>
	<option value="5">+1.3 EV</option>
	<option value="6">+1.0 EV</option>
	<option value="7">+0.7 EV</option>
	<option value="8">+0.3 EV</option>
	<option value="9" selected>0 EV</option>
	<option value="10">-0.3 EV</option>
	<option value="11">-0.7 EV</option>
	<option value="12">-1.0 EV</option>
	<option value="13">-1.3 EV</option>
	<option value="14">-1.7 EV</option>
	<option value="15">-2.0 EV</option>
	<option value="16">-2.3 EV</option>
	<option value="17">-2.7 EV</option>
	<option value="18">-3.0 EV</option>
	</select>
	</div>
	</div>
	</section>
	<!-- SET BUTTON -->
	<div class="form-group col-xs-12 col-sm-12 col-md-12">
	<div>
	<label>Parameter Update</label>
	</div>
	<div class="col-xs-12 col-sm-12 col-md-12">
	<button id="Btn_EV_COMP" class="btn btn-primary" >Update</button>
	</div>
	</div>
</div>

	<!-- White Balance -->
<div class="row" style="background-color:#EEE">
	<section id="White_Balance_title">
	<div class="form-group col-xs-12 col-sm-12 col-md-12">
	<label> <small>R/B Gain is manual using only and values range are 0x000~0x7FF<br>
	(Please see "SC2000_Surveillance_SDK_Camera_IF_specification")</small></label>
	</div>
	</section>
</div>

<div class="row" style="background-color:#EEE">
	<!-- White Balance(mode) -->
	<section id="White_Balance">
	<div class="form-group col-xs-12 col-sm-4 col-md-4">
	<div style="float:left;">
	<label> White Balance(Mode)</label>
	</div>
	<div class="col-xs-6 col-sm-6 col-md-6">
	<select class="form-control" id="SEL_WHITE_BALANCE">
	<option value="0" selected>Auto</option>
	<option value="1">12000K :Daylight Sky</option>
	<option value="2">8000K: Shade of Daylight</option>
	<option value="3">6500K: Cloudy Sky</option>
	<option value="4">5400K: Daylight</option>
	<option value="5">5000K: Fluorescent1</option>
	<option value="6">4200K: Fluorescent2</option>
	<option value="7">3500K: Fluorescent3</option>
	<option value="8">3000K: Incandescent</option>
	<option value="9">2000K: Setting sun</option>
	<option value="10">Flash</option>
	<option value="11">Manual</option>
	</select>
	</div>
	</div>
	</section>
	<!-- R Gain -->
	<section id="R_Gain">
	<div class="form-group col-xs-12 col-sm-4 col-md-4">
	<div style="float:left;">
	<label> R Gain(Use only for Manual)</label>
	</div>
	<div class="col-xs-6 col-sm-6 col-md-6">
	<input id="TXT_R_GAIN" type="text" class="form-control" value="0x100">
	</div>
	</div>
	</section>
	<!-- B Gain -->
	<section id="B_Gain">
	<div class="form-group col-xs-12 col-sm-4 col-md-4">
	<div style="float:left;">
	<label> B Gain(Use only for Manual)</label>
	</div>
	<div class="col-xs-6 col-sm-6 col-md-6">
	<input id="TXT_B_GAIN" type="text" class="form-control" value="0x100">
	</div>
	</div>
	</section>
	<!-- SET BUTTON -->
	<div class="form-group col-xs-12 col-sm-12 col-md-12">
	<div>
	<label>Please push, after setting White Balance</label>
	</div>
	<div class="col-xs-12 col-sm-12 col-md-12">
	<button id="Btn_WHITEBALANCE" class="btn btn-primary" >Update</button>
	</div>
	</div>
	</section>
</div>

<div class="row" style="background-color:#FFA">

	<div class="form-group col-xs-12 col-sm-12 col-md-12">

	</div>
	<div class="col-xs-12 col-sm-12 col-md-12">

	</div>
	</div>
	</section>
</div>

	</div>

</div>

	<!-- YC 2 -->

	</div>
