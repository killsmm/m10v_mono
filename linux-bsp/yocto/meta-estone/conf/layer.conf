# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
	${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "estone"
BBFILE_PATTERN_estone = "^${LAYERDIR}/"
BBFILE_PRIORITY_estone = "6"

# meta-estone is part of the m10v monorepo. Keep application sources in the
# top-level app directory instead of duplicating them inside the Yocto layer.
M10V_MONOREPO_ROOT := "${@os.path.abspath(os.path.join(d.getVar('LAYERDIR', True), '../../..'))}"

INSANE_SKIP_${PN} += "already-stripped"
